;nt to  PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
monitor_raw = yes
monitor_dtr = 0
monitor_rts = 0

; CRITICAL: ESP32-C3 MINI requires USB CDC to be enabled
; This board has no USB-to-UART chip, uses native USB CDC
lib_deps = 
    bblanchon/ArduinoJson@^7.2.0
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/RTClib@^2.1.3
    adafruit/Adafruit Unified Sensor@^1.1.14

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; TFT_eSPI Setup
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DST7735_GREENTAB=1 ; Common for 1.8" TFT
    -DTFT_RGB_ORDER=TFT_BGR ; Fix Yellow appearing as Blue
    -DTFT_MOSI=6
    -DTFT_SCLK=4
    -DTFT_CS=7
    -DTFT_DC=2
    -DTFT_RST=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DUSE_FSPI_PORT=1
    -DSPI_FREQUENCY=27000000
